<!DOCTYPE html>
<html>

<head>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #game {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
        }
    </style>
</head>

<body>
    <div id="game">Loading Emulator...</div>
    <script>
        // Use hash for robust passing without server interference, fallback to search if not in hash
        const paramsString = window.location.hash ? window.location.hash.substring(1) : window.location.search;
        const urlParams = new URLSearchParams(paramsString);
        let romUrl = urlParams.get('rom');
        let gameName = urlParams.get('name') || 'Unknown Game';
        let core = urlParams.get('core') || 'mgba'; // Default to mgba
        
        // If the URL has #rom=... but not parsed well, try to manually extract occasionally URLSearchParams has quirks with hashes
        if (!romUrl && window.location.hash.includes('rom=')) {
            const hashParts = window.location.hash.substring(1).split('&');
            for (let part of hashParts) {
                if (part.startsWith('rom=')) romUrl = decodeURIComponent(part.split('=')[1]);
                if (part.startsWith('name=')) gameName = decodeURIComponent(part.split('=')[1]);
                if (part.startsWith('core=')) core = part.split('=')[1];
            }
        }

        // Isolate save states by user profile
        const currentUser = localStorage.getItem('nostalgia_current_user') || 'Guest';
        gameName = `${currentUser}_${gameName}`;

        if (romUrl) {
            window.EJS_player = '#game';
            window.EJS_core = core; 
            window.EJS_gameUrl = romUrl;
            window.EJS_gameName = gameName; // Ensures save states are tied to the specific game AND user
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/latest/data/';
            window.EJS_startOnLoaded = true;
            
            // Forcer la sauvegarde dans le navigateur au lieu de télécharger un fichier
            window.EJS_defaultOptions = {
                'save-state-location': 'browser',
                'f-skip': '1', // Frame skip to help performance on slower machines
                'performance': 'true'
            };
            
            // Forcer l'écriture automatique de la sauvegarde (SRAM) toutes les 5 secondes
            window.EJS_fixedSaveInterval = 5000;

            // UI Enhancement: Show controls on the sides if there's space
            const keysOverlay = document.createElement('div');
            keysOverlay.style.cssText = `
                position: fixed;
                top: 50%;
                left: 20px;
                transform: translateY(-50%);
                color: rgba(255,255,255,0.4);
                font-family: 'Segoe UI', sans-serif;
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 1px;
                line-height: 2;
                pointer-events: none;
                z-index: 1000;
                text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            `;
            keysOverlay.innerHTML = `
                <div style="font-weight: 800; color: #7ec4ff; margin-bottom: 10px; font-size: 13px;">CONTROLES</div>
                <b>FLÈCHES</b> : DIR<br>
                <b>X</b> : BOUTON A<br>
                <b>Z</b> : BOUTON B<br>
                <b>A</b> : GACHETTE L<br>
                <b>S</b> : GACHETTE R<br>
                <b>ENTRER</b> : START<br>
                <b>SHIFT</b> : SELECT
            `;
            document.body.appendChild(keysOverlay);

            const script = document.createElement('script');
            script.src = 'https://cdn.emulatorjs.org/latest/data/loader.js';
            document.body.appendChild(script);

            // Auto-focus window for keys
            window.focus();
            document.addEventListener('mousedown', () => window.focus());

            // Report mouse acts to parent for custom cursor support
            window.addEventListener('mousemove', (e) => {
                window.parent.postMessage({ type: 'mii-mousemove', x: e.clientX, y: e.clientY }, '*');
            });
            window.addEventListener('mousedown', (e) => {
                window.parent.postMessage({ type: 'mii-mousedown', x: e.clientX, y: e.clientY }, '*');
            });
        } else {
            document.getElementById('game').innerText = "No ROM provided!";
        }
    </script>
</body>

</html>
