<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hylia Plaza</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/hub.css" />
  <link rel="stylesheet" href="css/window.css" />
  <link rel="stylesheet" href="mii maker app/css/mii.css" />
  
  <!-- Three.js and OrbitControls -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/ColladaLoader.js"></script>
</head>

<body>
  <!-- AUTHENTICATION OVERLAY -->
  <div id="auth-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 10000; flex-direction: column; backdrop-filter: blur(10px); overflow: hidden;">
    
    <!-- Background layer for Miis -->
    <div id="auth-bg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;">
      <style>
        .auth-mii {
          position: absolute;
          animation: floatMii linear infinite;
        }
        .auth-bubble {
          position: absolute;
          top: -30px;
          left: 50%;
          transform: translateX(-50%);
          background: white;
          color: black;
          padding: 5px 10px;
          border-radius: 12px;
          font-size: 12px;
          font-weight: bold;
          white-space: nowrap;
          box-shadow: 0 4px 6px rgba(0,0,0,0.3);
          opacity: 0;
          pointer-events: none;
        }
        .auth-bubble::after {
          content: '';
          position: absolute;
          bottom: -5px;
          left: 50%;
          transform: translateX(-50%);
          border-width: 5px 5px 0;
          border-style: solid;
          border-color: white transparent transparent transparent;
        }
        @keyframes floatMii {
          0% { transform: translateY(100vh) rotate(-10deg); opacity: 0; }
          10% { opacity: 0.6; }
          90% { opacity: 0.6; }
          100% { transform: translateY(-20vh) rotate(10deg); opacity: 0; }
        }
        @keyframes popBubble {
          0%, 20% { opacity: 0; transform: translateX(-50%) translateY(10px) scale(0.8); }
          25%, 75% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
          80%, 100% { opacity: 0; transform: translateX(-50%) translateY(-10px) scale(0.8); }
        }
      </style>
    </div>

    <!-- Login Box -->
    <div style="position: relative; z-index: 10; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; padding: 40px; text-align: center; color: white; width: 350px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); backdrop-filter: blur(20px);">
      <h1 style="margin: 0 0 20px 0; font-size: 28px; background: linear-gradient(135deg, #7ec4ff, #4a9fff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Hylia Plaza</h1>
      <p style="margin-bottom: 30px; font-size: 14px; color: #ccc;">Connectez-vous pour accéder à vos sauvegardes.</p>

      <input type="text" id="auth-username" placeholder="Nom d'utilisateur" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; background: rgba(255,255,255,0.2); color: white; outline: none; box-sizing: border-box;">
      <input type="password" id="auth-password" placeholder="Mot de passe" style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: none; background: rgba(255,255,255,0.2); color: white; outline: none; box-sizing: border-box;">
      
      <div id="auth-error" style="color: #ff6b6b; font-size: 13px; margin-bottom: 15px; display: none;"></div>

      <div style="display: flex; gap: 10px; justify-content: center;">
        <button id="btn-login" style="padding: 10px 20px; border-radius: 8px; border: none; background: #4a9fff; color: white; font-weight: bold; cursor: pointer; flex: 1;">Connexion</button>
        <button id="btn-register" style="padding: 10px 20px; border-radius: 8px; border: 1px solid #4a9fff; background: transparent; color: #4a9fff; font-weight: bold; cursor: pointer; flex: 1;">Créer un compte</button>
      </div>
    </div>
  </div>

  <!-- Background Environment (Skies, bubbles, particles) -->
  <!-- Top Bar -->
  <div id="top-bar">
    <div class="top-section left">
      <div id="user-avatar-badge" style="display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.2); padding: 6px 20px 6px 6px; border-radius: 50px;">
        <!-- Avatar and Username -->
        <div id="top-avatar-container" style="width: 76px; height: 76px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; overflow: hidden; border: 3px solid rgba(255,255,255,0.4); box-shadow: 0 4px 10px rgba(0,0,0,0.3);"></div>
        <div id="top-username" style="font-size: 24px; font-weight: bold; margin-right: 15px; color: white; text-shadow: 1px 1px 3px rgba(0,0,0,0.5);"></div>
        <button id="btn-logout" title="Déconnexion" style="background: rgba(255,50,50,0.9); border: 2px solid white; color: white; width: 44px; height: 44px; border-radius: 50%; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s, background 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.3);" onmouseover="this.style.transform='scale(1.1)'; this.style.background='rgba(255,0,0,1)'" onmouseout="this.style.transform='scale(1)'; this.style.background='rgba(255,50,50,0.9)'">⏻</button>
      </div>
      <div class="profile-group">
        <div class="profile-icon"></div>
        <div class="profile-icon"></div>
        <div class="profile-icon"></div>
        <div class="profile-count">+ 4</div>
      </div>
      <div class="bumper-btn">L</div>
    </div>

    <div id="dynamic-title-pill" class="glossy-glass">
      Hylia Plaza
    </div>

    <div class="top-section right">
      <div class="bumper-btn">R</div>
      <div class="status-group">
        <span class="status-icon">🕐</span>
        <span id="top-time">12:00 PM</span> | <span id="top-date">08/25</span>
        <span class="battery-icon">🔋</span>
      </div>
    </div>
  </div>

  <!-- Main Central Container -->
  <div id="main-container" class="glossy-glass">
    <div id="app-grid">

      <!-- Gallery (2x1) - Daily Log icon (bar chart) -->
      <div class="grid-tile tile-wide app-trigger" data-app="gallery" data-title="Memory Gallery" tabindex="0">
        <div class="tile-inner">
          <img class="tile-icon" src="assets/icons/wii/daily-log.png" alt="Gallery">
        </div>
      </div>

      <!-- Music - Chat icon (closest to audio/communication) -->
      <div class="grid-tile tile-square app-trigger" data-app="music" data-title="Radio Station" tabindex="0">
        <div class="tile-inner">
          <img class="tile-icon" src="assets/icons/wii/chat.png" alt="Music">
        </div>
      </div>

      <!-- Themes - Settings wrench -->
      <div class="grid-tile tile-square" id="theme-tile" data-title="Themes" tabindex="0">
        <div class="tile-inner">
          <img class="tile-icon" src="assets/icons/wii/settings.png" alt="Themes">
        </div>
      </div>

      <!-- Mii Maker - Friends (Mii faces) -->
      <div class="grid-tile tile-square app-trigger" data-app="miiMaker" data-title="Mii Maker" tabindex="0">
        <div class="tile-inner">
          <img class="tile-icon" src="assets/icons/wii/friends.png" alt="Mii Maker">
        </div>
      </div>

      <!-- Mii Plaza - Miiverse (community icons) -->
      <div class="grid-tile tile-square app-trigger" data-app="miiPlaza" data-title="Mii Plaza" tabindex="0">
        <div class="tile-inner">
          <img class="tile-icon" src="assets/icons/wii/miiverse.png" alt="Mii Plaza">
        </div>
      </div>

      <!-- System Transfer - Browser globe (network) -->
      <div class="grid-tile tile-square placeholder-app" data-title="System Transfer" tabindex="0">
        <div class="tile-inner">
          <img class="tile-icon" src="assets/icons/wii/browser.png" alt="System Transfer">
        </div>
      </div>

      <!-- Arcade - eShop bag (games store) -->
      <div class="grid-tile tile-square app-trigger" data-app="arcade" data-title="Classic Arcade" tabindex="0">
        <div class="tile-inner">
          <img class="tile-icon" src="assets/icons/wii/eshop.png" alt="Arcade">
        </div>
      </div>

      <!-- Notes - SVG notepad (no exact match) -->
      <div class="grid-tile tile-square app-trigger" data-app="notes" data-title="Notepad" tabindex="0">
        <div class="tile-inner">
          <svg class="tile-icon" viewBox="0 0 100 100" fill="none">
            <rect x="14" y="10" width="72" height="82" rx="10" fill="#f39c12"/>
            <rect x="18" y="18" width="64" height="68" rx="8" fill="#fef9e7"/>
            <circle cx="35" cy="10" r="7" fill="#e67e22"/>
            <circle cx="50" cy="10" r="7" fill="#e67e22"/>
            <circle cx="65" cy="10" r="7" fill="#e67e22"/>
            <line x1="26" y1="34" x2="74" y2="34" stroke="#f39c12" stroke-width="3" stroke-linecap="round"/>
            <line x1="26" y1="46" x2="74" y2="46" stroke="#f39c12" stroke-width="3" stroke-linecap="round"/>
            <line x1="26" y1="58" x2="62" y2="58" stroke="#f39c12" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <!-- Animal Crossing (2x1) - SVG Isabelle -->
      <div class="grid-tile tile-wide placeholder-app" data-title="Animal Crossing Plaza" tabindex="0">
        <div class="tile-inner">
          <svg class="tile-icon" viewBox="0 0 100 100" fill="none">
            <rect x="0" y="0" width="100" height="100" fill="#87ceeb"/>
            <circle cx="80" cy="22" r="14" fill="#FFD700"/>
            <ellipse cx="50" cy="88" rx="54" ry="22" fill="#7dce82"/>
            <ellipse cx="50" cy="82" rx="54" ry="18" fill="#a8e06b"/>
            <circle cx="50" cy="52" r="24" fill="#f5d06e"/>
            <circle cx="30" cy="34" r="12" fill="#f5d06e"/>
            <circle cx="30" cy="34" r="7" fill="#e8a020"/>
            <circle cx="70" cy="34" r="12" fill="#f5d06e"/>
            <circle cx="70" cy="34" r="7" fill="#e8a020"/>
            <circle cx="43" cy="52" r="4" fill="#2c3e50"/>
            <circle cx="57" cy="52" r="4" fill="#2c3e50"/>
            <circle cx="44" cy="51" r="1.5" fill="white"/>
            <circle cx="58" cy="51" r="1.5" fill="white"/>
            <path d="M42 61 Q50 68 58 61" stroke="#c0392b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M40 32 Q50 28 60 32 Q50 38 40 32Z" fill="#e74c3c"/>
          </svg>
        </div>
      </div>

      <!-- Guest Book (3x2) - Miiverse icon (community/writing) -->
      <div class="grid-tile tile-large app-trigger" data-app="guestbook" data-title="Guest Book" tabindex="0">
        <div class="tile-inner">
          <img class="tile-icon" src="assets/icons/wii/miiverse.png" alt="Guest Book">
        </div>
      </div>

      <!-- GBA - SVG Game Boy -->
      <div class="grid-tile tile-square app-trigger" data-app="gba" data-title="GBA Emulator" tabindex="0">
        <div class="tile-inner">
          <svg class="tile-icon" viewBox="0 0 100 100" fill="none">
            <rect x="6" y="24" width="88" height="58" rx="20" fill="#6c5ce7"/>
            <rect x="14" y="32" width="44" height="30" rx="5" fill="#001428"/>
            <rect x="18" y="36" width="36" height="22" rx="3" fill="#1a6f3c"/>
            <circle cx="36" cy="47" r="6" fill="#ff8c00"/>
            <circle cx="74" cy="38" r="6" fill="#e74c3c"/>
            <circle cx="82" cy="46" r="6" fill="#f39c12"/>
            <circle cx="74" cy="54" r="6" fill="#2ecc71"/>
            <circle cx="66" cy="46" r="6" fill="#3498db"/>
            <rect x="22" y="66" width="6" height="18" rx="2" fill="#2c3e50"/>
            <rect x="16" y="72" width="18" height="6" rx="2" fill="#2c3e50"/>
            <rect x="42" y="72" width="10" height="4" rx="2" fill="#2c3e50"/>
            <rect x="54" y="72" width="10" height="4" rx="2" fill="#2c3e50"/>
          </svg>
        </div>
      </div>

      <!-- Zelda - SVG Triforce -->
      <div class="grid-tile tile-square placeholder-app" data-title="Zelda Collection" tabindex="0">
        <div class="tile-inner">
          <svg class="tile-icon" viewBox="0 0 100 100" fill="none">
            <rect x="0" y="0" width="100" height="100" fill="#2c1810"/>
            <polygon points="50,8 66,36 34,36" fill="#f39c12"/>
            <polygon points="34,38 50,66 18,66" fill="#f39c12"/>
            <polygon points="66,38 82,66 50,66" fill="#f39c12"/>
            <polygon points="50,15 62,35 38,35" fill="#FFD700"/>
            <polygon points="37,40 49,60 24,60" fill="#FFD700"/>
            <polygon points="63,40 75,60 51,60" fill="#FFD700"/>
          </svg>
        </div>
      </div>

      <!-- Pokémon GIF tile (2x1) -->
      <div class="grid-tile tile-wide placeholder-app" data-title="Pokémon" tabindex="0">
        <div class="tile-inner" style="padding:0; overflow:hidden;">
          <img src="assets/gif/pokemon1.gif" alt="Pokémon" style="width:100%;height:100%;object-fit:cover;display:block;border-radius:20px;">
        </div>
      </div>

    </div>
  </div>

  <!-- Music Player Bar -->
  <div id="music-bar">
    <div class="music-bar-inner glossy-glass">
      <div class="music-bar-icon">🎵</div>
      <div class="music-bar-info">
        <div id="music-track-name">Aucune musique</div>
        <div class="music-bar-subtitle">Hylia Plaza</div>
      </div>
      <div class="music-bar-controls">
        <button id="music-prev" class="music-ctrl-btn">⏮</button>
        <button id="music-play" class="music-ctrl-btn play-btn">▶</button>
        <button id="music-next" class="music-ctrl-btn">⏭</button>
      </div>
    </div>
  </div>

  <!-- Bottom Bar Controls -->
  <div id="bottom-bar">
    <div class="bottom-group left">
      <button class="btn-prompt"><span class="btn-key">Y</span> Edit</button>
      <button class="btn-prompt"><span class="btn-key">-</span> Details</button>
    </div>

    <div class="pagination-dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="bottom-group right">
      <button class="btn-prompt"><span class="btn-key">A</span> Select</button>
      <button class="btn-prompt"><span class="btn-key">+</span> Menu</button>
    </div>
  </div>

  <!-- Container for dynamic OS windows -->
  <div id="window-layer"></div>

  <!-- Firebase Core Initialization -->
  <script type="module" src="js/core/firebase.js"></script>

  <!-- Script imports: Core -> Components -> Apps -> Init -->
  <script type="module" src="js/core/auth.js"></script>
  <script src="js/core/audio.js"></script>
  <script src="js/core/windowManager.js"></script>
  <script src="js/core/themeManager.js"></script>
  <script>
    window.process = { env: { NODE_ENV: 'production' } };
    window.global = window;
  </script>
  <script type="module">
    import Mii from './mii maker app/js/mii.js';
    window.Mii = Mii;
  </script>
  <script src="mii maker app/js/miiBuilder.js"></script>
  <script src="mii maker app/js/avatar.js"></script>

  <script src="js/apps/gallery.js"></script>
  <script src="js/apps/music.js"></script>
  <script src="js/apps/hallOfFame.js"></script>
  <script src="js/apps/notes.js"></script>
  <script src="js/apps/guestbook.js"></script>
  <script src="mii maker app/js/miiMaker.js?v=17"></script>
  <script src="mii maker app/js/miiPlaza.js?v=17"></script>
  <script src="gba app/js/gba.js"></script>

  <script src="js/core/app.js"></script>
</body>

</html>
